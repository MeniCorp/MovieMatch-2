name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name for this release (e.g., 1.0.0)"
        required: true
        default: "1.0.0"
        type: string
      version_code:
        description: "Version code (integer)"
        required: true
        default: 1
        type: number
      release_notes:
        description: "Release notes"
        required: false
        default: ""
        type: string

env:
  APP_NAME: MovieMatch2

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-debug-${{ github.event.inputs.version_name }}-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-release-${{ github.event.inputs.version_name }}-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Generate release notes
        id: release_notes
        run: |
          NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ github.event.inputs.version_name }} (${{ github.event.inputs.version_code }})

Generated automatically via GitHub Actions."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name }}
          name: v${{ github.event.inputs.version_name }} - ${{ env.APP_NAME }}
          body: |
            ${{ steps.release_notes.outputs.notes }}

            ## Assets

            - Debug APK: `${{ env.APP_NAME }}-debug.apk`
            - Release APK: `${{ env.APP_NAME }}-release.apk`

            ## Checksums

            - Debug: `${{ github.sha }}`
            - Release: `${{ github.sha }}`
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
          draft: false
          prerelease: false