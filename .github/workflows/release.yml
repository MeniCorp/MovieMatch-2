name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name for this release (e.g., 1.0.0)"
        required: false
        default: ""
        type: string
      version_code:
        description: "Version code (integer)"
        required: false
        default: ""
        type: number
      release_notes:
        description: "Release notes"
        required: false
        default: ""
        type: string

env:
  APP_NAME: MovieMatch2

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.get-version.outputs.version_name }}
      version_code: ${{ steps.get-version.outputs.version_code }}
      tag_name: ${{ steps.get-version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - id: get-version
        run: |
          VERSION_NAME=$(grep -o 'versionName = "[^"]*"' app/build.gradle.kts | head -1 | sed 's/versionName = "\([^"]*\)"/\1/')
          VERSION_CODE=$(grep -o 'versionCode = [0-9]*' app/build.gradle.kts | head -1 | sed 's/versionCode = \([0-9]*\)/\1/')
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            VERSION_NAME="${{ github.event.inputs.version_name }}"
          fi
          if [ -n "${{ github.event.inputs.version_code }}" ]; then
            VERSION_CODE="${{ github.event.inputs.version_code }}"
          fi
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME="v${VERSION_NAME}-${{ github.run_number }}-${{ github.sha }}"
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  build:
    needs: get-version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3

      - run: ./gradlew assembleDebug

      - run: ./gradlew assembleRelease

      - id: list-apks
        run: |
          echo "Debug APKs:"
          find app/build/outputs/apk/debug -name "*.apk" 2>/dev/null || echo "None"
          echo "Release APKs:"
          find app/build/outputs/apk/release -name "*.apk" 2>/dev/null || echo "None"

      - id: find-release-apk
        run: |
          find app/build/outputs/apk/release -name "*.apk" > /tmp/release_apks.txt 2>/dev/null || true
          if [ -s /tmp/release_apks.txt ]; then
            while IFS= read -r apk; do
              echo "release_apk<<EOF" >> "$GITHUB_OUTPUT"
              echo "$apk" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
            done < /tmp/release_apks.txt
          fi
          echo "Debug APK: app/build/outputs/apk/debug/app-debug.apk"
          echo "Release APKs found:"
          cat /tmp/release_apks.txt || echo "None"

      - id: checksums
        run: |
          echo "debug_sha256=$(sha256sum app/build/outputs/apk/debug/app-debug.apk | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          if [ -n "${{ steps.find-release-apk.outputs.release_apk }}" ]; then
            echo "release_sha256=$(sha256sum "${{ steps.find-release-apk.outputs.release_apk }}" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
            echo "release_apk=${{ steps.find-release-apk.outputs.release_apk }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_sha256=n/a (no release APK found)" >> "$GITHUB_OUTPUT"
            echo "release_apk=" >> "$GITHUB_OUTPUT"
          fi

      - id: commits
        run: |
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          git log --oneline --no-merges -5 >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Write release notes to file
        id: release_notes
        run: |
          {
            echo "Release ${{ needs.get-version.outputs.version_name }} (${{ needs.get-version.outputs.version_code }})"
            echo ""
            echo "Build: ${{ github.sha }}"
            echo "Trigger: ${{ github.event_name }}"
            echo "Branch: ${{ github.ref_name }}"
            echo ""
            echo "### Commit History"
            echo "${{ steps.commits.outputs.commits }}"
            echo ""
            echo "Checksums:"
            echo "- Debug APK: ${{ steps.checksums.outputs.debug_sha256 }}"
            echo "- Release APK: ${{ steps.checksums.outputs.release_sha256 }}"
          } > /tmp/release_body.md

      - name: Delete existing release with same tag (if any)
        continue-on-error: true
        run: |
          gh release delete "${{ needs.get-version.outputs.tag_name }}" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: "${{ needs.get-version.outputs.tag_name }}"
          name: "${{ needs.get-version.outputs.tag_name }} - ${{ env.APP_NAME }}"
          bodyFile: /tmp/release_body.md
          artifacts: |
            app/build/outputs/apk/debug/app-debug.apk
            ${{ steps.find-release-apk.outputs.release_apk }}
          token: ${{ secrets.GITHUB_TOKEN }}
          omitBodyDuringUpdate: true