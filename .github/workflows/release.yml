name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name for this release (e.g., 1.0.0)"
        required: false
        default: ""
        type: string
      version_code:
        description: "Version code (integer)"
        required: false
        default: ""
        type: number
      release_notes:
        description: "Release notes"
        required: false
        default: ""
        type: string

env:
  APP_NAME: MovieMatch2

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.get-version.outputs.version_name }}
      version_code: ${{ steps.get-version.outputs.version_code }}
      tag_name: ${{ steps.get-version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - id: get-version
        run: |
          VERSION_NAME=$(grep -o 'versionName = "[^"]*"' app/build.gradle.kts | head -1 | sed 's/versionName = "\([^"]*\)"/\1/')
          VERSION_CODE=$(grep -o 'versionCode = [0-9]*' app/build.gradle.kts | head -1 | sed 's/versionCode = \([0-9]*\)/\1/')
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            VERSION_NAME="${{ github.event.inputs.version_name }}"
          fi
          if [ -n "${{ github.event.inputs.version_code }}" ]; then
            VERSION_CODE="${{ github.event.inputs.version_code }}"
          fi
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME="v${VERSION_NAME}-${{ github.run_number }}-${{ github.sha }}"
          fi
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

  build:
    needs: get-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3

      - run: ./gradlew assembleDebug

      - run: ./gradlew assembleRelease

      - id: checksums
        run: |
          echo "debug_sha256=$(sha256sum app/build/outputs/apk/debug/app-debug.apk | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "release_sha256=$(sha256sum app/build/outputs/apk/release/app-release.apk | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - id: commits
        run: |
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          git log --oneline --no-merges -5 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - id: release_notes
        run: |
          chmod +x scripts/generate-release-notes.sh
          NOTES=$(scripts/generate-release-notes.sh \
            "${{ needs.get-version.outputs.version_name }}" \
            "${{ needs.get-version.outputs.version_code }}" \
            "${{ github.sha }}" \
            "${{ github.event_name }}" \
            "${{ github.ref_name }}" \
            "${{ steps.commits.outputs.commits }}" \
            "${{ steps.checksums.outputs.debug_sha256 }}" \
            "${{ steps.checksums.outputs.release_sha256 }}" \
            "${{ github.event.inputs.release_notes }}")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete existing release with same tag (if any)
        continue-on-error: true
        run: |
          gh release delete "${{ needs.get-version.outputs.tag_name }}" --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.tag_name }}
          name: ${{ needs.get-version.outputs.tag_name }} - ${{ env.APP_NAME }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
